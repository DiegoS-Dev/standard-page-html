<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Página Estrutura Básica</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    .menu {
      height: 10%;
      width: 100%;
      border: 1px solid red;
      text-align: right;
    }
    .conteudo {
      display: flex;
      height: 80%;
      width: 100%;
    }
    .coluna-esquerda {
      width: 70%;
      border: 1px solid blue;
      text-align: right;
    }
    .coluna-direita {
      width: 30%;
      border: 1px solid green;
      text-align: right;
    }
    .rodape {
      height: 10%;
      width: 100%;
      border: 1px solid orange;
      text-align: right;
    }
    div {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="menu">Menu Topo</div>
  <div class="conteudo">
    <div class="coluna-esquerda">Coluna Esquerda (70%)</div>
    <div class="coluna-direita">Coluna Direita (30%)</div>
  </div>
  <div class="rodape">Rodapé</div>
</body>
</html>
